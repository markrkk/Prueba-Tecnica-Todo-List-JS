<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List JS</title>
   <link rel="stylesheet" href="css/style.css">
  
</head>

<body>

    <main class="contenedor">

        <h1>Todo List</h1>

        <p class="descripcion">
            Añade tus tareas, márcalas como completadas o elimínalas.
        </p>

        <form id="formulario">
            <input type="text" id="inputTarea" placeholder="Escribe una tarea">
            <button type="submit">Añadir</button>
        </form>

        <p id="mensaje"></p>

        <ul id="listaTareas"></ul>

        <div class="acciones">
            <button id="eliminarCompletadas">Eliminar completadas</button>
            <button id="eliminarTodas">Eliminar todas</button>
        </div>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
